name: 'Cloudability Governance Wrapper'
description: 'Wrapper action that calls IBM Cloudability Governance actions to replicate the error structure'
author: 'Test'

inputs:
  fd-url:
    description: 'Frontdoor URL'
    required: true
  fd-public-key:
    description: 'Frontdoor public key'
    required: true
  fd-secret-key:
    description: 'Frontdoor secret key'
    required: true
  github-token:
    description: 'GitHub token for PR operations'
    required: true
  pr-number:
    description: 'Pull request number'
    required: true
  cloudability-host:
    description: 'Cloudability host URL'
    required: true
  fd-env-id:
    description: 'Frontdoor environment ID'
    required: true
  deployment-name:
    description: 'Deployment name'
    required: true
  project-name:
    description: 'Project name'
    required: true
  provider-accounts:
    description: 'Provider accounts JSON'
    required: true
  tf-plan:
    description: 'Terraform plan file'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Get Frontdoor token
      uses: IBM/ibm-cloudability-governance/actions/frontdoor/login@v0.2.4
      with:
        fd-url: ${{ inputs.fd-url }}
        fd-public-key: ${{ inputs.fd-public-key }}
        fd-secret-key: ${{ inputs.fd-secret-key }}

    - name: Get GitHub PR metadata
      uses: IBM/ibm-cloudability-governance/actions/github-info@v0.2.4
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}

    - name: Run Cloudability Governance Metadata Retrieval
      uses: IBM/ibm-cloudability-governance/actions/metadata@v0.2.4
      with:
        cloudability-host: ${{ inputs.cloudability-host }}
        fd-env-id: ${{ inputs.fd-env-id }}

    - name: Run Cloudability Cost Estimation
      uses: IBM/ibm-cloudability-governance/actions/cost-estimation@v0.2.4
      continue-on-error: true
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}
        cloudability-host: ${{ inputs.cloudability-host }}
        fd-env-id: ${{ inputs.fd-env-id }}
        deployment-name: ${{ inputs.deployment-name }}
        project-name: ${{ inputs.project-name }}
        provider-accounts: ${{ inputs.provider-accounts }}
        tf-plan: ${{ inputs.tf-plan }}

    - name: Run Cloudability Governance Policy Evaluation
      uses: IBM/ibm-cloudability-governance/actions/policy-evaluation@v0.2.4
      continue-on-error: true
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}
        cloudability-host: ${{ inputs.cloudability-host }}
        fd-env-id: ${{ inputs.fd-env-id }}
        deployment-name: ${{ inputs.deployment-name }}
        project-name: ${{ inputs.project-name }}
        provider-accounts: ${{ inputs.provider-accounts }}
        tf-plan: ${{ inputs.tf-plan }}

    - name: Run Cloudability Recommendation
      uses: IBM/ibm-cloudability-governance/actions/recommendation@v0.2.4
      continue-on-error: true
      with:
        github-token: ${{ inputs.github-token }}
        pr-number: ${{ inputs.pr-number }}
        cloudability-host: ${{ inputs.cloudability-host }}
        fd-env-id: ${{ inputs.fd-env-id }}
        deployment-name: ${{ inputs.deployment-name }}
        project-name: ${{ inputs.project-name }}
        provider-accounts: ${{ inputs.provider-accounts }}
        tf-plan: ${{ inputs.tf-plan }}

