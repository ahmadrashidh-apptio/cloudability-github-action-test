name: Cloudability Governance Test
run-name: Deployment Run
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  cloudability-governance:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Frontdoor token
        uses: cloudability/costguard-github-action/actions/frontdoor/login@v0.2.5
        with:
          fd-url: ${{ secrets.FD_URL }}
          fd-public-key: ${{ secrets.FD_PUBLIC_KEY }}
          fd-secret-key: ${{ secrets.FD_SECRET_KEY }}

      - name: Get GitHub PR metadata
        uses: cloudability/costguard-github-action/actions/github-info@v0.2.5
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Run Cloudability Governance Metadata Retrieval
        uses: cloudability/costguard-github-action/actions/metadata@v0.2.5
        with:
          cloudability-host: ${{ secrets.CLDY_HOST }}
          fd-env-id: ${{ secrets.FD_ENV_ID }}

      - name: Run Cloudability Cost Estimation
        uses: cloudability/costguard-github-action/actions/cost-estimation@v0.2.5
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          cloudability-host: ${{ secrets.CLDY_HOST }}
          fd-env-id: ${{ secrets.FD_ENV_ID }}
          deployment-name: "gh-test-deployment"
          project-name: "gh-test-project"
          provider-accounts: |
            {
              "aws": {
                "account_id": "${{ secrets.AWS_ACCOUNT_ID }}",
                "vendor": "aws"
              }
            }
          tf-plan: "tfplan.json"

